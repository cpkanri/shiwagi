<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f7d5b"/><stop offset="1" stop-color="#103f2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.20" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#eafaff"/><stop offset="0.55" stop-color="#a8e0f4"/><stop offset="1" stop-color="#76c8ea"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#155741"/><stop offset="1" stop-color="#0a3826"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="114" ry="114" fill="url(#glow)"/>

  <!-- 三段峡・斜めアングル(水色): 右上から手前左へ落ちる三段の滝 -->
  <g>
    <!-- 右の崖 (緑・主) -->
    <path d="M300 38 C 336 60, 350 112, 332 162 C 322 152, 314 128, 308 108
             C 316 100, 310 88, 300 92 C 304 74, 302 56, 300 38 Z" fill="url(#cliff)"/>
    <!-- 崖の水際ハイライト -->
    <path d="M300 40 C 308 70, 312 96, 308 108" stroke="#2a7a5c" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- 手前左の岩 (近景) -->
    <path d="M182 152 C 196 140, 212 141, 222 154 C 212 166, 192 166, 182 160 Z" fill="url(#cliff)"/>

    <!-- 連続する三段の滝 (水色) -->
    <path d="M278 48
             C 276 58, 276 64, 284 70
             C 296 74, 308 74, 312 68
             C 306 80, 296 86, 286 86
             C 270 86, 262 94, 256 104
             C 268 108, 282 108, 288 102
             C 282 116, 270 122, 258 122
             C 240 122, 230 132, 222 146
             C 234 152, 252 152, 260 144
             C 252 158, 236 164, 220 162
             C 206 160, 200 156, 196 150
             C 206 140, 222 132, 236 116
             C 246 104, 250 92, 256 78
             C 262 66, 268 56, 278 48 Z" fill="url(#water)"/>

    <!-- 落ち口のロック段 (緑・斜め) -->
    <g stroke="#0c3d2c" stroke-width="5" stroke-linecap="round">
      <path d="M284 70 C 294 74, 306 73, 314 67"/>
      <path d="M256 104 C 266 108, 280 107, 288 101"/>
      <path d="M222 146 C 234 152, 250 151, 262 143"/>
    </g>
    <!-- 水筋 (濃いめの水色) -->
    <g stroke="#5cb6dd" stroke-width="1.8" stroke-linecap="round" opacity="0.8">
      <path d="M288 52 C 286 60, 286 66, 290 72"/>
      <path d="M262 88 C 258 96, 256 102, 258 108"/>
      <path d="M232 124 C 226 134, 224 140, 226 148"/>
    </g>
    <!-- 飛沫 (白) -->
    <g fill="#ffffff" opacity="0.95">
      <ellipse cx="296" cy="72"  rx="13" ry="3.2"/>
      <ellipse cx="270" cy="106" rx="15" ry="3.4"/>
      <ellipse cx="236" cy="148" rx="17" ry="3.6"/>
    </g>
    <!-- 滝つぼ -->
    <ellipse cx="216" cy="161" rx="33" ry="8.5" fill="#6fc4e2"/>
    <ellipse cx="214" cy="159" rx="23" ry="5.5" fill="#c7eefb"/>
    <ellipse cx="210" cy="158" rx="11" ry="2.6" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- 柴木 -->
  <text x="258" y="312" text-anchor="middle" font-family="Noto Sans CJK JP" font-weight="900"
        font-size="150" fill="#0c2c20" fill-opacity="0.45" letter-spacing="6">柴木</text>
  <text x="256" y="309" text-anchor="middle" font-family="Noto Sans CJK JP" font-weight="900"
        font-size="150" fill="#f4f1ea" letter-spacing="6">柴木</text>
  <rect x="156" y="338" width="200" height="4" rx="2" fill="#79cde8" fill-opacity="0.92"/>
  <text x="256" y="384" text-anchor="middle" font-family="Noto Sans CJK JP" font-weight="500"
        font-size="40" fill="#c4e6d8" letter-spacing="3">浄化センター</text>
  <text x="256" y="420" text-anchor="middle" font-family="Noto Sans CJK JP" font-weight="400"
        font-size="22" fill="#8cc1ae" letter-spacing="6">SHIWAGI</text>
</svg>
