<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>柴木浄化センター 週報入力</title>
<link rel="manifest" href="manifest.json">
<style>
/* ============================================================
   CSS Variables
   ============================================================ */
:root {
  --primary: #1a6b4e;
  --primary-light: #e8f5ef;
  --primary-dark: #0d4a34;
  --accent: #f59e0b;
  --bg: #f5f3ef;
  --card: #fff;
  --text: #1a1a1a;
  --text2: #666;
  --border: #ddd;
  --danger: #dc2626;
  --success: #16a34a;
  --radius: 10px;
}

/* ============================================================
   Reset & Base
   ============================================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-text-size-adjust: 100%;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header-left h1 {
  font-size: 15px;
  font-weight: 600;
}
.header-left .sub {
  font-size: 11px;
  opacity: .8;
  margin-top: 2px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-top: 2px;
}
.online-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ef4444;
  border: 2px solid rgba(255,255,255,.5);
  transition: background .3s;
}
.online-dot.online {
  background: #22c55e;
}
.online-label {
  font-size: 10px;
  opacity: .8;
}

/* ============================================================
   Date Bar
   ============================================================ */
.date-bar {
  background: var(--card);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.date-bar label {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.date-bar select,
.date-bar input[type="date"] {
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  background: #fff;
}
.date-bar .week-label {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  background: var(--primary-light);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ============================================================
   Main Tabs
   ============================================================ */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: none;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  border: none;
  background: none;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  cursor: pointer;
  transition: all .2s;
}
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* ============================================================
   Week Tabs
   ============================================================ */
.week-tabs {
  display: flex;
  background: #fafaf8;
  padding: 4px 12px;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}
.week-tab {
  flex: 1;
  padding: 6px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--text2);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.week-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ============================================================
   Day Tabs (for Water Quality)
   ============================================================ */
.day-tabs {
  display: flex;
  background: #fafaf8;
  padding: 4px 12px;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}
.day-tab {
  flex: 1;
  padding: 6px 4px;
  font-size: 11px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--text2);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.day-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.day-tab .date-sub {
  font-size: 9px;
  display: block;
  margin-top: 1px;
}

/* ============================================================
   Content Area
   ============================================================ */
.content {
  padding: 12px;
}

/* ============================================================
   Section Headers
   ============================================================ */
.section-title,
.section-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin: 16px 0 8px;
  padding: 6px 10px;
  background: var(--primary-light);
  border-radius: 6px;
  border-left: 3px solid var(--primary);
}
.section-title:first-child,
.section-header:first-child {
  margin-top: 4px;
}

/* ============================================================
   Form Layout (Water Quality - single day form)
   ============================================================ */
.form-wrap {
  /* container for form-based input */
}
.form-wrap .section {
  margin-bottom: 8px;
}
.form-wrap .section-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin: 12px 0 6px;
  padding: 6px 10px;
  background: var(--primary-light);
  border-radius: 6px;
  border-left: 3px solid var(--primary);
}
.form-wrap .field {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid #f0f0f0;
  gap: 8px;
  background: var(--card);
}
.form-wrap .field:last-child {
  border-bottom: none;
}
.form-wrap .field .label {
  flex: 1;
  font-size: 13px;
  min-width: 0;
}
.form-wrap .field .unit {
  font-size: 11px;
  color: var(--text2);
  min-width: 30px;
  text-align: right;
}
.form-wrap .field input[type="number"],
.form-wrap .field input[type="text"] {
  width: 120px;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  text-align: right;
  background: #fff;
  -webkit-appearance: none;
}
.form-wrap .field input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 2px rgba(26,107,78,.15);
}

/* ============================================================
   Inspector Field
   ============================================================ */
.inspector-field {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: #fafaf8;
  border-bottom: 1px solid var(--border);
}
.inspector-field .label {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.inspector-field input {
  flex: 1;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
}

/* ============================================================
   Toggle Button
   ============================================================ */
.toggle-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  min-width: 64px;
  min-height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  background: #fff;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.toggle-btn.has-value {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
}

/* ============================================================
   Table Layout (Equipment, Electrical, Mechanical)
   ============================================================ */
.input-group {
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.day-header {
  display: grid;
  grid-template-columns: 1fr repeat(5, 52px) 28px 28px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  background: #fafaf8;
  border-bottom: 1px solid var(--border);
}
.day-header span {
  text-align: center;
}

.day-inputs {
  display: grid;
  grid-template-columns: 1fr repeat(5, 52px) 28px 28px;
  padding: 8px 12px;
  align-items: center;
  gap: 4px;
  border-bottom: 1px solid #f0f0f0;
}
.day-inputs:last-child {
  border-bottom: none;
}
.day-inputs .label {
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.day-inputs .label .sub {
  font-size: 10px;
  color: var(--text2);
  display: block;
}
.day-inputs input {
  width: 100%;
  padding: 5px 2px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
  background: #fff;
  -webkit-appearance: none;
}
.day-inputs input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 2px rgba(26,107,78,.15);
}

/* Toggle Cell (table) */
.day-inputs .toggle-cell {
  width: 100%;
  padding: 4px 1px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 10px;
  text-align: center;
  background: #fff;
  cursor: pointer;
  user-select: none;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.day-inputs .toggle-cell.has-value {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}

/* ============================================================
   Copy / Clear Column Buttons
   ============================================================ */
.col-action {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  color: var(--text2);
  transition: background .15s;
}
.col-action.copy-btn {
  color: var(--primary);
}
.col-action.copy-btn:active {
  background: var(--primary-light);
}
.col-action.clear-btn {
  color: var(--danger);
}
.col-action.clear-btn:active {
  background: #fee2e2;
}

/* ============================================================
   Copied Highlight Animation
   ============================================================ */
.copied {
  animation: copiedFlash .5s;
}
@keyframes copiedFlash {
  0% { background: var(--primary-light); }
  100% { background: transparent; }
}

/* ============================================================
   Water Actions Bar
   ============================================================ */
.water-actions {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: #fafaf8;
  border-bottom: 1px solid var(--border);
}
.water-actions .btn {
  flex: none;
  padding: 8px 16px;
  font-size: 12px;
}

/* ============================================================
   Bottom Bar
   ============================================================ */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  box-shadow: 0 -2px 8px rgba(0,0,0,.08);
  z-index: 100;
}

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:active {
  background: var(--primary-dark);
}
.btn-secondary {
  background: #f0f0f0;
  color: var(--text);
}
.btn-secondary:active {
  background: #e0e0e0;
}
.btn-danger {
  background: var(--danger);
  color: #fff;
}
.btn-danger:active {
  background: #b91c1c;
}
.btn-excel {
  background: var(--success);
  color: #fff;
}
.btn-excel:active {
  background: #15803d;
}
.btn-sync {
  background: var(--accent);
  color: #fff;
}
.btn-sync:active {
  background: #d97706;
}
.btn-load {
  background: #6366f1;
  color: #fff;
}
.btn-load:active {
  background: #4f46e5;
}

/* ============================================================
   Toast Notification
   ============================================================ */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity .3s;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  pointer-events: none;
}
.toast.show {
  opacity: 1;
}
.toast.success {
  background: var(--success);
  color: #fff;
}
.toast.error {
  background: var(--danger);
  color: #fff;
}
.toast.info {
  background: var(--primary);
  color: #fff;
}

/* ============================================================
   Loading Overlay
   ============================================================ */
.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.loading.show {
  display: flex;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #fff;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   Tab Content Panels (hidden by default)
   ============================================================ */
.tab-panel {
  display: none;
}
.tab-panel.active {
  display: block;
}

/* ============================================================
   Print Styles
   ============================================================ */
@media print {
  body {
    padding-bottom: 0;
    background: #fff;
    font-size: 10px;
  }
  .header {
    position: static;
    background: none;
    color: #000;
    box-shadow: none;
    padding: 8px 0;
    border-bottom: 2px solid #000;
  }
  .header-left h1 {
    font-size: 16px;
    color: #000;
  }
  .header-left .sub {
    color: #333;
  }
  .header-right {
    display: none;
  }
  .date-bar {
    border-bottom: 1px solid #999;
    padding: 6px 0;
  }
  .tabs,
  .week-tabs,
  .day-tabs,
  .water-actions,
  .bottom-bar,
  .loading,
  .toast {
    display: none !important;
  }
  .content {
    padding: 0;
  }
  .tab-panel {
    display: block !important;
    page-break-after: always;
  }
  .tab-panel:last-child {
    page-break-after: auto;
  }
  .input-group {
    box-shadow: none;
    border: 1px solid #999;
  }
  .section-title,
  .section-header {
    background: none;
    border-left: 2px solid #000;
    color: #000;
    padding: 3px 8px;
    margin: 8px 0 4px;
    font-size: 11px;
  }
  .form-wrap .field {
    padding: 4px 8px;
    border-bottom: 1px solid #ccc;
  }
  .form-wrap .field input,
  .form-wrap .field .toggle-btn {
    border: 1px solid #999;
    font-size: 11px;
    padding: 2px 4px;
  }
  .day-header {
    background: #eee;
    border-bottom: 1px solid #999;
    font-size: 10px;
  }
  .day-inputs {
    font-size: 10px;
    padding: 3px 8px;
    border-bottom: 1px solid #ddd;
  }
  .day-inputs input,
  .day-inputs .toggle-cell {
    border: 1px solid #999;
    font-size: 10px;
    padding: 1px 2px;
  }
  .col-action {
    display: none;
  }
  .inspector-field {
    padding: 4px 8px;
    border-bottom: 1px solid #999;
  }
  .inspector-field input {
    border: 1px solid #999;
    font-size: 11px;
  }
  /* print: show inspector name on every sheet */
  .print-inspector {
    display: block;
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid #999;
  }
}
.print-inspector {
  display: none;
}
</style>
</head>
<body>

<!-- ============================================================
     Header
     ============================================================ -->
<div class="header">
  <div class="header-left">
    <h1>柴木浄化センター 週報入力</h1>
    <div class="sub">維持管理週報データ入力システム</div>
  </div>
  <div class="header-right">
    <span class="online-label" id="onlineLabel">offline</span>
    <span class="online-dot" id="onlineDot"></span>
  </div>
</div>

<!-- ============================================================
     Date Bar
     ============================================================ -->
<div class="date-bar">
  <label>対象月:</label>
  <select id="monthSelect" onchange="onMonthChange()"></select>
  <label>開始日:</label>
  <input type="date" id="startDate" onchange="onDateChange()">
  <span class="week-label" id="weekLabel">-</span>
</div>

<!-- ============================================================
     Main Tabs
     ============================================================ -->
<div class="tabs" id="mainTabs">
  <button class="tab active" data-tab="water" onclick="switchTab('water')">日常水質</button>
  <button class="tab" data-tab="hours" onclick="switchTab('hours')">機器運転時間</button>
  <button class="tab" data-tab="electrical" onclick="switchTab('electrical')">日常電気設備</button>
  <button class="tab" data-tab="mechanical" onclick="switchTab('mechanical')">日常機械設備</button>
</div>

<!-- ============================================================
     Week Tabs
     ============================================================ -->
<div class="week-tabs" id="weekTabs"></div>

<!-- ============================================================
     Day Tabs (Water Quality)
     ============================================================ -->
<div class="day-tabs" id="dayTabs" style="display:none;"></div>

<!-- ============================================================
     Content Area
     ============================================================ -->
<div class="content" id="content"></div>

<!-- ============================================================
     Bottom Bar
     ============================================================ -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="undoAction()">戻す</button>
  <button class="btn btn-load" onclick="loadFromServer()">読込</button>
  <button class="btn btn-primary" onclick="saveCurrentTab()">保存</button>
  <button class="btn btn-sync" onclick="syncAll()">全同期</button>
  <button class="btn btn-excel" onclick="exportExcel()">Excel</button>
</div>

<!-- ============================================================
     Loading Overlay
     ============================================================ -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- ============================================================
     Toast
     ============================================================ -->
<div class="toast" id="toast"></div>

<!-- ============================================================
     SheetJS (Excel export library)
     ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

/* ============================================================
   Utility Functions
   ============================================================ */
function skey(tab, week) {
  return STORAGE_PREFIX + currentMonth + '_' + tab + '_w' + week;
}

function showLoading(v) {
  document.getElementById('loading').classList.toggle('show', v);
}

function showToast(msg, type) {
  type = type || 'success';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(function() {
    t.classList.remove('show');
  }, 3000);
}

function formatDate(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

function computeDayDate(dayIdx) {
  var sd = document.getElementById('startDate').value;
  if (!sd) return null;
  var d = new Date(sd);
  d.setDate(d.getDate() + (currentWeek - 1) * 7 + dayIdx);
  return d;
}

function dayDateStr(dayIdx) {
  var d = computeDayDate(dayIdx);
  if (!d) return '';
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function updateOnlineStatus() {
  var on = navigator.onLine;
  document.getElementById('onlineDot').classList.toggle('online', on);
  document.getElementById('onlineLabel').textContent = on ? 'online' : 'offline';
}

/* ============================================================
   Initialization
   ============================================================ */
function init() {
  var today = new Date();

  // Month select
  var sel = document.getElementById('monthSelect');
  for (var i = -2; i <= 3; i++) {
    var d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    var val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    var opt = document.createElement('option');
    opt.value = val;
    opt.textContent = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
  var savedMonth = localStorage.getItem(STORAGE_PREFIX + 'current_month');
  if (savedMonth) {
    sel.value = savedMonth;
  }
  currentMonth = sel.value;

  // Start date (this week's Monday)
  var day = today.getDay();
  var diff = day === 0 ? -6 : 1 - day;
  var monday = new Date(today);
  monday.setDate(today.getDate() + diff);
  document.getElementById('startDate').value = formatDate(monday);
  onDateChange();

  // Online status
  updateOnlineStatus();
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);

  // Render
  renderWeekTabs();
  renderDayTabs();
  renderTab();
}

/* ============================================================
   Date Change Handlers
   ============================================================ */
function onMonthChange() {
  currentMonth = document.getElementById('monthSelect').value;
  localStorage.setItem(STORAGE_PREFIX + 'current_month', currentMonth);
  renderTab();
}

function onDateChange() {
  var val = document.getElementById('startDate').value;
  if (!val) return;
  var d = new Date(val);
  var endD = new Date(d);
  endD.setDate(d.getDate() + 4);
  document.getElementById('weekLabel').textContent =
    (d.getMonth() + 1) + '/' + d.getDate() + '〜' +
    (endD.getMonth() + 1) + '/' + endD.getDate();
  renderDayTabs();
  renderTab();
}

/* ============================================================
   Week Tabs
   ============================================================ */
function renderWeekTabs() {
  var c = document.getElementById('weekTabs');
  var html = '';
  for (var w = 1; w <= 5; w++) {
    html += '<button class="week-tab' +
      (w === currentWeek ? ' active' : '') +
      '" onclick="switchWeek(' + w + ')">第' + w + '週</button>';
  }
  c.innerHTML = html;
}

function switchWeek(w) {
  saveToLocal();
  currentWeek = w;
  renderWeekTabs();
  renderDayTabs();
  renderTab();
}

/* ============================================================
   Day Tabs (Water Quality only)
   ============================================================ */
function renderDayTabs() {
  var c = document.getElementById('dayTabs');
  var html = '';
  for (var i = 0; i < DAYS.length; i++) {
    var ds = dayDateStr(i);
    html += '<button class="day-tab' +
      (DAYS[i] === currentDay ? ' active' : '') +
      '" onclick="switchDay(\'' + DAYS[i] + '\')">' +
      DAY_LABELS[i] +
      '<span class="date-sub">' + ds + '</span></button>';
  }
  c.innerHTML = html;
  c.style.display = (currentTab === 'water') ? 'flex' : 'none';
}

function switchDay(d) {
  saveToLocal();
  currentDay = d;
  renderDayTabs();
  renderTab();
}

/* ============================================================
   Main Tab Switch
   ============================================================ */
function switchTab(tab) {
  saveToLocal();
  currentTab = tab;
  var tabs = document.querySelectorAll('#mainTabs .tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
  }
  document.getElementById('dayTabs').style.display =
    (tab === 'water') ? 'flex' : 'none';
  renderTab();
}

/* ============================================================
   Render Tab Content
   ============================================================ */
function renderTab() {
  var c = document.getElementById('content');
  tabIdx = 1;
  switch (currentTab) {
    case 'water':
      c.innerHTML = renderWater();
      break;
    case 'hours':
      c.innerHTML = renderHours();
      break;
    case 'electrical':
      c.innerHTML = renderElectrical();
      break;
    case 'mechanical':
      c.innerHTML = renderMechanical();
      break;
  }
  restoreFromLocal();
  setupInputHandlers();
}

/* ============================================================
   Render: Water Quality (form-based, one day at a time)
   ============================================================ */
function renderWater() {
  var html = '';

/* ============================================================
   Toggle Operations
   ============================================================ */
function cycleToggle(btn) {
  var opts = JSON.parse(btn.dataset.options);
  var cur = btn.textContent.trim();
  var idx = opts.indexOf(cur);
  idx = (idx + 1) % (opts.length + 1);
  if (idx === opts.length) {
    btn.textContent = '';
    btn.dataset.value = '';
    btn.classList.remove('has-value');
  } else {
    btn.textContent = opts[idx];
    btn.dataset.value = opts[idx];
    btn.classList.add('has-value');
  }
  pushUndo();
  autoSave();
}

function cycleToggleCell(cell) {
  var opts = JSON.parse(cell.dataset.options);
  var cur = cell.textContent.trim();
  var idx = opts.indexOf(cur);
  idx = (idx + 1) % (opts.length + 1);
  if (idx === opts.length) {
    cell.textContent = '-';
    cell.dataset.value = '';
    cell.classList.remove('has-value');
  } else {
    cell.textContent = opts[idx];
    cell.dataset.value = opts[idx];
    cell.classList.add('has-value');
  }
  pushUndo();
  autoSave();
}

/* ============================================================
   Copy Previous Day (Water Quality form)
   ============================================================ */
function copyPrevDay() {
  var dayIdx = DAYS.indexOf(currentDay);
  if (dayIdx <= 0) {
    showToast('月曜日は前日コピーできません', 'info');
    return;
  }
  var prevDay = DAYS[dayIdx - 1];
  var weekData = getLocalWater();
  if (!weekData[prevDay]) {
    showToast('前日データがありません', 'info');
    return;
  }
  pushUndo();
  var pd = weekData[prevDay];
  COPY_FIELDS.forEach(function(key) {
    if (pd[key] !== undefined && pd[key] !== '') {
      var el = document.querySelector('[data-field="' + key + '"]');
      if (!el) return;
      if (el.classList.contains('toggle-btn')) {
        el.textContent = pd[key];
        el.dataset.value = pd[key];
        el.classList.toggle('has-value', !!pd[key]);
      } else {
        el.value = pd[key];
      }
      el.classList.add('copied');
      setTimeout(function() { el.classList.remove('copied'); }, 500);
    }
  });
  autoSave();
  showToast('前日データをコピーしました');
}

/* ============================================================
   Clear Current Day (Water Quality form)
   ============================================================ */
function clearCurrentDay() {
  pushUndo();
  var elems = document.querySelectorAll('#content [data-field]');
  for (var i = 0; i < elems.length; i++) {
    var el = elems[i];
    if (el.dataset.field === 'inspector') continue;
    if (el.classList.contains('toggle-btn')) {
      el.textContent = '';
      el.dataset.value = '';
      el.classList.remove('has-value');
    } else {
      el.value = '';
    }
  }
  autoSave();
  showToast('クリアしました');
}

/* ============================================================
   Table Column Copy / Clear
   ============================================================ */
function copyPrevCol(btn) {
  var row = btn.closest('.day-inputs');
  var cells = row.querySelectorAll('[data-day]');
  pushUndo();
  var byCols = {};
  cells.forEach(function(c) { byCols[c.dataset.day] = c; });
  for (var i = 1; i < DAYS.length; i++) {
    var prev = byCols[DAYS[i - 1]];
    var cur = byCols[DAYS[i]];
    if (prev && cur && getCellVal(cur) === '') {
      setCellVal(cur, getCellVal(prev));
      cur.classList.add('copied');
      (function(el) {
        setTimeout(function() { el.classList.remove('copied'); }, 500);
      })(cur);
    }
  }
  autoSave();
}

function clearRow(btn) {
  var row = btn.closest('.day-inputs');
  pushUndo();
  var cells = row.querySelectorAll('[data-day]');
  for (var i = 0; i < cells.length; i++) {
    setCellVal(cells[i], '');
  }
  autoSave();
}

function getCellVal(el) {
  if (el.classList.contains('toggle-cell')) {
    return el.dataset.value || '';
  }
  return el.value || '';
}

function setCellVal(el, val) {
  if (el.classList.contains('toggle-cell')) {
    el.textContent = val || '-';
    el.dataset.value = val || '';
    el.classList.toggle('has-value', val !== '' && val !== '-');
  } else {
    el.value = val;
  }
}

/* ============================================================
   Auto-Focus Navigation
   ============================================================ */
function setupInputHandlers() {
  if (currentTab === 'water') {
    // Form: vertical focus movement on Enter
    var inputs = document.querySelectorAll(
      '#content input[type="number"], #content input[type="text"]'
    );
    for (var i = 0; i < inputs.length; i++) {
      (function(idx) {
        inputs[idx].addEventListener('focus', function() {
          this.select();
        });
        inputs[idx].addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            var next = inputs[idx + 1];
            if (next) next.focus();
          }
        });
        inputs[idx].addEventListener('change', function() {
          pushUndo();
          autoSave();
        });
      })(i);
    }
  } else {
    // Table: vertical focus movement on Enter (same column)
    var allInputs = Array.from(
      document.querySelectorAll('#content input[type="number"]')
    );
    for (var j = 0; j < allInputs.length; j++) {
      (function(inp) {
        inp.addEventListener('focus', function() {
          this.select();
        });
        inp.addEventListener('change', function() {
          pushUndo();
          autoSave();
        });
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            var day = this.dataset.day;
            var row = this.closest('.day-inputs');
            var nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('day-inputs')) {
              var next = nextRow.querySelector('[data-day="' + day + '"]');
              if (next) {
                if (next.tagName === 'INPUT') {
                  next.focus();
                } else {
                  next.click();
                }
              }
            }
          }
        });
      })(allInputs[j]);
    }
  }
}

/* ============================================================
   Undo
   ============================================================ */
function pushUndo() {
  var snap = collectData();
  undoStack.push(JSON.stringify(snap));
  if (undoStack.length > 30) {
    undoStack.shift();
  }
}

function undoAction() {
  if (undoStack.length === 0) {
    showToast('元に戻せません', 'info');
    return;
  }
  var prev = JSON.parse(undoStack.pop());
  restoreData(prev);
  autoSave();
  showToast('元に戻しました');
}

/* ============================================================
   Data Collection & Restoration
   ============================================================ */
function collectData() {
  var data = {};
  if (currentTab === 'water') {
    var elems = document.querySelectorAll('#content [data-field]');
    for (var i = 0; i < elems.length; i++) {
      var el = elems[i];
      var key = el.dataset.field;
      if (el.classList.contains('toggle-btn')) {
        data[key] = el.dataset.value || '';
      } else {
        data[key] = el.value;
      }
    }
  } else {
    var cells = document.querySelectorAll('#content [data-key]');
    for (var j = 0; j < cells.length; j++) {
      var cell = cells[j];
      var k = cell.dataset.key;
      var d = cell.dataset.day;
      if (!data[k]) data[k] = {};
      data[k][d] = getCellVal(cell);
    }
  }
  return data;
}

function restoreData(data) {
  if (!data) return;
  if (currentTab === 'water') {
    var elems = document.querySelectorAll('#content [data-field]');
    for (var i = 0; i < elems.length; i++) {
      var el = elems[i];
      var key = el.dataset.field;
      if (data[key] !== undefined) {
        if (el.classList.contains('toggle-btn')) {
          el.textContent = data[key] || '';
          el.dataset.value = data[key] || '';
          el.classList.toggle('has-value', !!data[key]);
        } else {
          el.value = data[key];
        }
      }
    }
  } else {
    var cells = document.querySelectorAll('#content [data-key]');
    for (var j = 0; j < cells.length; j++) {
      var cell = cells[j];
      var k = cell.dataset.key;
      var d = cell.dataset.day;
      if (data[k] && data[k][d] !== undefined) {
        setCellVal(cell, data[k][d]);
      }
    }
  }
}

/* ============================================================
   localStorage Operations
   ============================================================ */
function autoSave() {
  saveToLocal();
}

function saveToLocal() {
  var data = collectData();
  if (currentTab === 'water') {
    var sk = skey('water', currentWeek);
    var weekData = {};
    try {
      weekData = JSON.parse(localStorage.getItem(sk)) || {};
    } catch (e) { /* ignore */ }
    weekData[currentDay] = data;
    localStorage.setItem(sk, JSON.stringify(weekData));
    // Persist inspector name
    if (data.inspector) {
      localStorage.setItem(STORAGE_PREFIX + 'last_inspector', data.inspector);
    }
  } else {
    var sk2 = skey(currentTab, currentWeek);
    localStorage.setItem(sk2, JSON.stringify(data));
  }
}

function restoreFromLocal() {
  if (currentTab === 'water') {
    var weekData = getLocalWater();
    if (weekData[currentDay]) {
      restoreData(weekData[currentDay]);
    }
    // Restore inspector name
    var savedIns = localStorage.getItem(STORAGE_PREFIX + 'last_inspector') || '';
    var insEl = document.querySelector('[data-field="inspector"]');
    if (insEl && !insEl.value && savedIns) {
      insEl.value = savedIns;
    }
  } else {
    var sk = skey(currentTab, currentWeek);
    try {
      var data = JSON.parse(localStorage.getItem(sk)) || {};
      restoreData(data);
    } catch (e) { /* ignore */ }
  }
}

function getLocalWater() {
  var sk = skey('water', currentWeek);
  try {
    return JSON.parse(localStorage.getItem(sk)) || {};
  } catch (e) {
    return {};
  }
}

function getLocalTab(tab, week) {
  var sk = STORAGE_PREFIX + currentMonth + '_' + tab + '_w' + week;
  try {
    return JSON.parse(localStorage.getItem(sk)) || {};
  } catch (e) {
    return {};
  }
}

/* ============================================================
   GAS Server Communication: Save Current Tab
   ============================================================ */
async function saveCurrentTab() {
  saveToLocal();
  var date = document.getElementById('startDate').value;
  if (!date) {
    showToast('日付を選択してください', 'error');
    return;
  }
  var inspector = localStorage.getItem(STORAGE_PREFIX + 'last_inspector') || '';

  showLoading(true);
  try {
    var payload;
    if (currentTab === 'water') {
      payload = {
        action: 'saveWeek',
        month: currentMonth,
        week: currentWeek,
        startDate: date,
        days: getLocalWater(),
        inspector: inspector
      };
    } else if (currentTab === 'hours') {
      var hObj = {};
      hObj[currentWeek] = getLocalTab('hours', currentWeek);
      payload = {
        action: 'saveEquipment',
        month: currentMonth,
        equipment: hObj,
        inspector: inspector
      };
    } else if (currentTab === 'electrical') {
      var eData = getLocalTab('electrical', currentWeek);
      var eObj = {};
      eObj[currentWeek] = {};
      DAYS.forEach(function(d) {
        eObj[currentWeek][d] = {};
        Object.keys(eData).forEach(function(k) {
          if (eData[k] && eData[k][d] !== undefined) {
            eObj[currentWeek][d][k] = eData[k][d];
          }
        });
      });
      payload = {
        action: 'saveElectrical',
        month: currentMonth,
        week: currentWeek,
        electrical: eObj,
        inspector: inspector
      };
    } else if (currentTab === 'mechanical') {
      var mData = getLocalTab('mechanical', currentWeek);
      var mObj = {};
      mObj[currentWeek] = {};
      DAYS.forEach(function(d) {
        mObj[currentWeek][d] = {};
        Object.keys(mData).forEach(function(k) {
          if (mData[k] && mData[k][d] !== undefined) {
            mObj[currentWeek][d][k] = mData[k][d];
          }
        });
      });
      payload = {
        action: 'saveMechanical',
        month: currentMonth,
        week: currentWeek,
        mechanical: mObj,
        inspector: inspector
      };
    }

    var res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    var json = await res.json();
    if (json.status === 'ok' || json.success) {
      showToast('保存しました');
    } else {
      showToast('保存エラー: ' + (json.error || ''), 'error');
    }
  } catch (e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
  showLoading(false);
}

/* ============================================================
   GAS Server Communication: Sync All Tabs
   ============================================================ */
async function syncAll() {
  var date = document.getElementById('startDate').value;
  if (!date) {
    showToast('日付を選択してください', 'error');
    return;
  }
  saveToLocal();
  var inspector = localStorage.getItem(STORAGE_PREFIX + 'last_inspector') || '';

  showLoading(true);
  try {
    var allData = {};
    for (var w = 1; w <= 5; w++) {
      allData[w] = {
        water: getLocalTab('water', w),
        hours: getLocalTab('hours', w),
        electrical: getLocalTab('electrical', w),
        mechanical: getLocalTab('mechanical', w)
      };
    }
    var payload = {
      action: 'saveAll',
      month: currentMonth,
      startDate: date,
      allData: allData,
      inspector: inspector
    };

    var res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    var json = await res.json();
    if (json.success) {
      showToast('全シート同期完了');
    } else {
      showToast('同期エラー: ' + (json.error || ''), 'error');
    }
  } catch (e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
  showLoading(false);
}

/* ============================================================
   GAS Server Communication: Load from Server
   ============================================================ */
async function loadFromServer() {
  showLoading(true);
  try {
    var url = GAS_URL + '?action=getAllData&month=' + currentMonth;
    var res = await fetch(url);
    var json = await res.json();
    if (json.success && json.data) {
      for (var w = 1; w <= 5; w++) {
        if (json.data[w]) {
          if (json.data[w].water) {
            localStorage.setItem(skey('water', w), JSON.stringify(json.data[w].water));
          }
          if (json.data[w].hours) {
            localStorage.setItem(skey('hours', w), JSON.stringify(json.data[w].hours));
          }
          if (json.data[w].electrical) {
            localStorage.setItem(skey('electrical', w), JSON.stringify(json.data[w].electrical));
          }
          if (json.data[w].mechanical) {
            localStorage.setItem(skey('mechanical', w), JSON.stringify(json.data[w].mechanical));
          }
        }
      }
      restoreFromLocal();
      showToast('サーバーから読み込みました');
    } else {
      showToast('データがありません', 'info');
    }
  } catch (e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
  showLoading(false);
}

function exportExcel() {
  showToast('Excel出力機能は後で実装します', 'info');
}

   ServiceWorker Registration
   ============================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(e) {
    console.log('SW registration failed:', e);
  });
}

/* ============================================================
   Start Application
   ============================================================ */
init();
</script>
